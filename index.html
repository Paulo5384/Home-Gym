// ─── AUDIO ────────────────────────────────────────────────────
function beep(ctx,f=880,d=0.15,v=0.4){if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);o.start();o.stop(ctx.currentTime+d);}
function beepEnd(ctx){if(!ctx)return;[440,550,660].forEach((f,i)=>setTimeout(()=>beep(ctx,f,0.2,0.5),i*180));}

const TODAY=()=>new Date().toISOString().slice(0,10);
const weekKey=d=>{const dt=new Date(d),j=new Date(dt.getFullYear(),0,1);return`${dt.getFullYear()}-W${String(Math.ceil(((dt-j)/86400000+j.getDay()+1)/7)).padStart(2,'0')}`;};
const monthKey=d=>d.slice(0,7);
const uid=()=>Math.random().toString(36).slice(2,8);

const PROFILES={
  paulo:{name:"Paulo",emoji:"💪",color:"#3b82f6",note:"42 años · Banda + peso corporal · Días A/B/C",plan:PAULO_PLAN},
  caro:{name:"Caro",emoji:"🌸",color:"#ec4899",note:"Kinesióloga · Gym + casa · ⚠️ Cuidar cadera derecha",plan:CARO_PLAN},
};

  useEffect(()=>{

        const ld=await getDoc(doc(db,"homegym",`${profile}_log`));
        console.log("Firestore plan exists:", pd.exists(), "log exists:", ld.exists());
        let lp, ll;
        if(pd.exists() && pd.data() && pd.data().value){
          lp=pd.data().value;
          console.log("Loaded plan from Firestore:", Object.keys(lp));
        } else {
          const sp=localStorage.getItem(`hg_plan_${profile}`);
          lp=sp?JSON.parse(sp):PROFILES[profile].plan;
          console.log("Loaded plan from localStorage or default");
        }
        if(ld.exists() && ld.data() && ld.data().value){
          ll=ld.data().value;
          console.log("Loaded log from Firestore, keys:", Object.keys(ll).length);
        } else {
          const sl=localStorage.getItem(`hg_log_${profile}`);

          console.log("Loaded log from localStorage or default");

        setPlan(lp);setLog(ll);setActiveDay(Object.keys(lp)[0]||"");
      }catch(e){

        const sp=localStorage.getItem(`hg_plan_${profile}`);
        const sl=localStorage.getItem(`hg_log_${profile}`);
        const lp=sp?JSON.parse(sp):PROFILES[profile].plan;
        setPlan(lp);setLog(sl?JSON.parse(sl):{});setActiveDay(Object.keys(lp)[0]||"");
      }
      setSyncing(false);
    };
    load();
  },[profile]);

  useEffect(()=>{
    if(!profile||!Object.keys(plan).length)return;

    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{await setDoc(doc(db,"homegym",`${profile}_plan`),{value:plan});setSyncStatus("saved");setTimeout(()=>setSyncStatus(""),2000);}
      catch{setSyncStatus("error");setTimeout(()=>setSyncStatus(""),3000);}
    },1500);
  },[plan,profile]);

  useEffect(()=>{
    if(!profile)return;
    localStorage.setItem(`hg_log_${profile}`,JSON.stringify(log));
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{await setDoc(doc(db,"homegym",`${profile}_log`),{value:log});setSyncStatus("saved");setTimeout(()=>setSyncStatus(""),2000);}
      catch{setSyncStatus("error");setTimeout(()=>setSyncStatus(""),3000);}
    },1500);
  },[log,profile]);

  const pColor=profile?PROFILES[profile].color:"#3b82f6";
  const getAudio=()=>{if(!audioCtx.current)audioCtx.current=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.current.state==="suspended")audioCtx.current.resume();return audioCtx.current;};
  const notify=(msg,type="ok")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),2500);};

  useEffect(()=>{
    if(timerRunning&&timerLeft>0){timerRef.current=setTimeout(()=>setTimerLeft(l=>{if(l<=1){setTimerRunning(false);beepEnd(getAudio());return 0;}if(l<=4)beep(getAudio(),660,0.1,0.3);return l-1;}),1000);}
    return()=>clearTimeout(timerRef.current);
  },[timerRunning,timerLeft]);

  useEffect(()=>{if(swOn)swRef.current=setInterval(()=>setSw(s=>s+1),1000);else clearInterval(swRef.current);return()=>clearInterval(swRef.current);},[swOn]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const lk=(date,dk,exId,si)=>`${date}__${dk}__${exId}__s${si}`;
  const getSet=(exId,si)=>{if(!activeDay)return{done:false,reps:"",weight:"",note:""};const k=lk(sessionDate,activeDay,exId,si);return log[k]||{done:false,reps:"",weight:"",note:""};};
  const updSet=(exId,si,field,val)=>{const k=lk(sessionDate,activeDay,exId,si);setLog(l=>({...l,[k]:{...getSet(exId,si),[field]:val}}));};

  const sessProg=()=>{if(!activeDay||!plan[activeDay])return{total:0,done:0,pct:0};let total=0,done=0;plan[activeDay].blocks.forEach(b=>b.exercises.forEach(ex=>{for(let i=0;i<ex.sets;i++){total++;if(getSet(ex.id,i).done)done++;}}));return{total,done,pct:total?Math.round(done/total*100):0};};

  const getSessionMuscles=date=>{const muscles=new Set();allLogKeys.filter(k=>k.startsWith(date)&&log[k].done).forEach(k=>{const[,dk,exId]=k.split("__");const dp=plan[dk];if(!dp)return;const ex=dp.blocks.flatMap(b=>b.exercises).find(e=>e.id===exId);if(!ex)return;const le=LIBRARY.find(l=>l.id===ex.libId);if(le)muscles.add(le.group||le.muscle);});return[...muscles];};
  const muscleHistory=()=>{const byM={};sessionDates.forEach(date=>{getSessionMuscles(date).forEach(m=>{if(!byM[m])byM[m]=[];byM[m].push(date);});});return byM;};
  const muscleFreq=()=>{const freq={};allLogKeys.forEach(k=>{if(!log[k].done)return;const[,dk,exId]=k.split("__");const dp=plan[dk];if(!dp)return;const ex=dp.blocks.flatMap(b=>b.exercises).find(e=>e.id===exId);if(!ex)return;const le=LIBRARY.find(l=>l.id===ex.libId);if(!le)return;freq[le.group||le.muscle]=(freq[le.group||le.muscle]||0)+1;});return freq;};
  const mFreq=muscleFreq();

    const sOk=!libSearch||ex.name.toLowerCase().includes(libSearch.toLowerCase())||ex.muscle.toLowerCase().includes(libSearch.toLowerCase());
    return gOk&&eOk&&sOk;
  });

  const swapEx=le=>{if(!swapTarget)return;const{dayKey,blockIdx,exIdx}=swapTarget;setPlan(p=>{const n=JSON.parse(JSON.stringify(p));const old=n[dayKey].blocks[blockIdx].exercises[exIdx];n[dayKey].blocks[blockIdx].exercises[exIdx]={...old,libId:le.id,name:le.name};return n;});notify(`↔ ${le.name}`);setSwapTarget(null);setLibModal(null);setTab("today");};
  const addExFromLib=le=>{if(!addTarget)return;const newEx={id:uid(),libId:le.id,name:le.name,sets:3,reps:"12-15",rest:60};setPlan(p=>{const n=JSON.parse(JSON.stringify(p));if(addTarget==="newBlock"){n[activeDay].blocks.push({name:"Bloque nuevo",exercises:[newEx]});}else{const{dayKey,blockIdx}=addTarget;n[dayKey].blocks[blockIdx].exercises.push(newEx);}return n;});notify(`✓ ${le.name} agregado`);setAddTarget(null);setLibModal(null);setTab("today");};
  const delEx=(dk,bi,ei)=>{setPlan(p=>{const n=JSON.parse(JSON.stringify(p));n[dk].blocks[bi].exercises.splice(ei,1);return n;});};
  const updEx=(dk,bi,ei,field,val)=>{setPlan(p=>{const n=JSON.parse(JSON.stringify(p));n[dk].blocks[bi].exercises[ei][field]=field==="sets"?parseInt(val)||1:val;return n;});};

  const s=(...styles)=>Object.assign({},...styles);

  // ── PROFILE SELECT ──────────────────────────────────────────
  if(!profile)return h("div",{style:s(base,{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24})},

  const isLibraryAction=swapTarget||addTarget;

    // LIB MODAL
    libModal&&h("div",{style:{position:"fixed",inset:0,background:"#000b",zIndex:900,display:"flex",alignItems:"flex-end"},onClick:()=>setLibModal(null)},

        h("div",{style:{display:"flex",gap:14,alignItems:"flex-start",marginBottom:12}},

          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:16,fontWeight:700,color:"#f1f5f9",marginBottom:4}},libModal.name),
            h("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}},
              h("span",{style:{background:GROUP_C[libModal.group]||"#334155",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}},libModal.muscle),

      )

    // ── SESSION ──
    tab==="today"&&h("div",{style:{padding:12}},
      h("div",{style:{display:"flex",gap:8,marginBottom:10,alignItems:"center"}},

          Object.keys(plan).map(d=>h("option",{key:d,value:d},plan[d].label||d))

        h("input",{type:"date",value:sessionDate,onChange:e=>setSessionDate(e.target.value),style:{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:6,padding:"7px 5px",fontSize:11}})

        h("button",{onClick:()=>{setAddTarget("newBlock");setTab("library");},style:{background:"#0f4c75",color:"#fff",border:"none",borderRadius:6,padding:"7px 12px",fontSize:12,cursor:"pointer"}},"+ Bloque")
      ),
      activeDay&&plan[activeDay]&&plan[activeDay].blocks.map((block,bIdx)=>

          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
            h("div",{style:{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}},block.name),
            editMode&&h("button",{onClick:()=>{setAddTarget({dayKey:activeDay,blockIdx:bIdx});setTab("library");},style:{background:"#0f4c75",color:"#93c5fd",border:"1px solid #1e40af",borderRadius:5,padding:"3px 8px",fontSize:11,cursor:"pointer"}},"+ ej.")
          ),
          block.exercises.map((ex,eIdx)=>{
            const allDone=Array.from({length:ex.sets},(_,i)=>getSet(ex.id,i).done).every(Boolean);
            const le=LIBRARY.find(l=>l.id===ex.libId);

            return h("div",{key:ex.id,style:{background:"#1e293b",borderRadius:10,marginBottom:8,overflow:"hidden",border:`1px solid ${allDone?"#166534":"#334155"}`,borderLeft:`3px solid ${gc}`}},
              h("div",{style:{padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #334155"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}},
                  le&&h("div",{style:{flexShrink:0,background:"#0f172a",borderRadius:6,padding:3}},h(PostureSVG,{pose:le.pose,color:gc,size:36})),
                  h("div",{style:{minWidth:0}},
                    h("div",{style:{fontSize:12,fontWeight:700,color:allDone?"#86efac":"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},`${allDone?"✓ ":""}${ex.name}`),

                ),
                h("div",{style:{display:"flex",gap:4,alignItems:"center",flexShrink:0,marginLeft:6}},
                  editMode?[
                    h("input",{key:"s",value:ex.sets,onChange:e=>updEx(activeDay,bIdx,eIdx,"sets",e.target.value),type:"number",min:"1",style:{width:32,background:"#0f172a",color:"#f1f5f9",border:"1px solid #475569",borderRadius:4,padding:"3px",fontSize:12,textAlign:"center"}}),

                    h("input",{key:"r",value:ex.reps,onChange:e=>updEx(activeDay,bIdx,eIdx,"reps",e.target.value),style:{width:48,background:"#0f172a",color:"#f1f5f9",border:"1px solid #475569",borderRadius:4,padding:"3px",fontSize:11,textAlign:"center"}}),

                    h("button",{key:"dl",onClick:()=>delEx(activeDay,bIdx,eIdx),style:{background:"#7f1d1d",border:"none",color:"#fca5a5",borderRadius:4,padding:"4px 6px",fontSize:11,cursor:"pointer"}},"✕"),
                  ]:[
                    h("span",{key:"info",style:{fontSize:11,color:"#64748b"}},`${ex.sets}×${ex.reps}`),

                  ]
                )
              ),
              le&&!editMode&&h("div",{style:{padding:"5px 10px 2px",fontSize:10,color:"#475569",fontStyle:"italic"}},`💡 ${le.tips}`),
              h("div",{style:{padding:"6px 10px 10px"}},

                  return h("div",{key:si,style:{display:"flex",gap:5,alignItems:"center",marginBottom:si<ex.sets-1?5:0}},
                    h("button",{onClick:()=>togDone(ex.id,si),style:{width:24,height:24,borderRadius:"50%",border:`2px solid ${sl.done?"#22c55e":"#475569"}`,background:sl.done?"#22c55e":"transparent",color:"#fff",fontSize:12,cursor:"pointer",flexShrink:0}},sl.done?"✓":""),
                    h("span",{style:{fontSize:10,color:"#64748b",width:14,flexShrink:0}},`S${si+1}`),
                    h("input",{placeholder:"Reps",value:sl.reps,onChange:e=>updSet(ex.id,si,"reps",e.target.value),style:{width:46,background:"#0f172a",color:"#f1f5f9",border:"1px solid #334155",borderRadius:5,padding:"4px",fontSize:11,textAlign:"center"}}),
                    h("input",{placeholder:"carga",value:sl.weight,onChange:e=>updSet(ex.id,si,"weight",e.target.value),style:{width:56,background:"#0f172a",color:"#f1f5f9",border:"1px solid #334155",borderRadius:5,padding:"4px",fontSize:11,textAlign:"center"}}),
                    h("input",{placeholder:"nota",value:sl.note,onChange:e=>updSet(ex.id,si,"note",e.target.value),style:{flex:1,background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:5,padding:"4px",fontSize:10}})
                  );
                })
              )
            );
          })
        )
      )
    ),

    // ── LIBRARY ──
    tab==="library"&&h("div",{style:{padding:12}},
      h("input",{placeholder:"🔍 Buscar ejercicio...",value:libSearch,onChange:e=>setLibSearch(e.target.value),style:{width:"100%",background:"#1e293b",color:"#f1f5f9",border:"1px solid #334155",borderRadius:8,padding:"9px 12px",fontSize:13,boxSizing:"border-box",marginBottom:8}}),
      h("div",{style:{display:"flex",gap:4,overflowX:"auto",marginBottom:6,paddingBottom:2}},
        GROUPS.map(g=>h("button",{key:g,onClick:()=>setLibGroup(g),style:{flexShrink:0,background:libGroup===g?(GROUP_C[g]||"#3b82f6"):"#1e293b",color:libGroup===g?"#fff":"#94a3b8",border:`1px solid ${libGroup===g?(GROUP_C[g]||"#3b82f6"):"#334155"}`,borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer"}},g))
      ),
      h("div",{style:{display:"flex",gap:4,marginBottom:10}},
        EQUIP_FILTER.map(e=>h("button",{key:e,onClick:()=>setLibEquip(e),style:{flexShrink:0,background:libEquip===e?"#334155":"#1e293b",color:libEquip===e?"#f1f5f9":"#64748b",border:`1px solid ${libEquip===e?"#475569":"#334155"}`,borderRadius:20,padding:"4px 10px",fontSize:11,cursor:"pointer"}},e))
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        filteredLib.map(ex=>{
          const gc=GROUP_C[ex.group]||"#64748b";
          return h("button",{key:ex.id,onClick:()=>setLibModal(ex),style:{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 8px",cursor:"pointer",textAlign:"center",borderTop:`3px solid ${gc}`}},
            h("div",{style:{background:"#0f172a",borderRadius:8,padding:6,marginBottom:6,display:"inline-block"}},h(PostureSVG,{pose:ex.pose,color:gc,size:60})),
            h("div",{style:{fontSize:11,fontWeight:700,color:"#f1f5f9",lineHeight:1.3,marginBottom:2}},ex.name),
            h("div",{style:{fontSize:10,color:gc,fontWeight:600}},ex.group),
            h("div",{style:{fontSize:9,color:"#64748b",marginTop:2}},`${ex.equipIcon} ${ex.equip} · `,h("span",{style:{color:DIFF_C[ex.diff]}},ex.diff))
          );
        })
      )
    ),

    // ── STATS ──
    tab==="stats"&&h("div",{style:{padding:16}},
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}},
        [["Hoy",pct],["Semana",Math.min(100,Math.round(Object.keys(log).filter(k=>weekKey(k.split("__")[0])===weekKey(sessionDate)&&log[k].done).length/Math.max(1,Object.keys(log).filter(k=>weekKey(k.split("__")[0])===weekKey(sessionDate)).length)*100))],["Mes",Math.min(100,Math.round(Object.keys(log).filter(k=>monthKey(k.split("__")[0])===monthKey(sessionDate)&&log[k].done).length/Math.max(1,Object.keys(log).filter(k=>monthKey(k.split("__")[0])===monthKey(sessionDate)).length)*100))]].map(([l,v])=>
          h("div",{key:l,style:{background:"#1e293b",borderRadius:10,padding:10,border:"1px solid #334155",textAlign:"center"}},
            h("svg",{viewBox:"0 0 56 56",width:"56",height:"56",style:{margin:"0 auto 4px",display:"block"}},
              h("circle",{cx:"28",cy:"28",r:"22",fill:"none",stroke:"#334155",strokeWidth:"5"}),
              h("circle",{cx:"28",cy:"28",r:"22",fill:"none",stroke:pColor,strokeWidth:"5",strokeDasharray:`${2*Math.PI*22}`,strokeDashoffset:`${2*Math.PI*22*(1-v/100)}`,strokeLinecap:"round",transform:"rotate(-90 28 28)"}),
              h("text",{x:"28",y:"33",textAnchor:"middle",fill:pColor,fontSize:"11",fontWeight:"bold"},`${v}%`)
            ),
            h("div",{style:{fontSize:12,fontWeight:600,color:"#f1f5f9"}},l)
          )
        )
      ),
      h("div",{style:{background:"#1e293b",borderRadius:10,padding:14,border:"1px solid #334155"}},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:10}},"Frecuencia por grupo muscular"),
        Object.keys(mFreq).length===0?h("div",{style:{fontSize:12,color:"#475569"}},"Registra sesiones para ver datos."):
        Object.entries(mFreq).sort((a,b)=>b[1]-a[1]).map(([m,v])=>{
          const max=Math.max(...Object.values(mFreq));const c=GROUP_C[m]||"#64748b";
          return h("div",{key:m,style:{display:"flex",alignItems:"center",gap:8,marginBottom:7}},
            h("div",{style:{width:65,fontSize:11,color:"#94a3b8",flexShrink:0}},m),
            h("div",{style:{flex:1,background:"#334155",borderRadius:4,height:14}},h("div",{style:{width:`${Math.round(v/max*100)}%`,background:c,height:14,borderRadius:4,minWidth:4}})),
            h("div",{style:{fontSize:11,color:c,width:24,textAlign:"right",flexShrink:0}},v)
          );
        })
      )
    ),

    // ── TIMER ──
    tab==="timer"&&h("div",{style:{padding:16}},
      h("div",{style:{background:"#1e293b",borderRadius:12,padding:20,border:"1px solid #334155",marginBottom:12,textAlign:"center"}},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:2,marginBottom:10}},"DESCANSO"),
        h("div",{style:{fontSize:76,fontWeight:800,color:timerColor,fontVariantNumeric:"tabular-nums",lineHeight:1}},fmt(timerLeft!=null?timerLeft:timerSecs)),
        h("div",{style:{display:"flex",gap:6,justifyContent:"center",marginTop:12,flexWrap:"wrap"}},
          [30,45,60,90,120].map(s=>h("button",{key:s,onClick:()=>{setTimerSecs(s);setTimerLeft(null);},style:{background:timerSecs===s?pColor:"#334155",color:"#f1f5f9",border:"none",borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer"}},`${s}s`))
        ),
        h("div",{style:{display:"flex",gap:8,justifyContent:"center",marginTop:14}},
          !timerRunning?h("button",{onClick:()=>{setTimerLeft(timerSecs);setTimerRunning(true);beep(getAudio());},style:{background:"#22c55e",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:16,fontWeight:700,cursor:"pointer"}},"▶ Iniciar"):
          h("button",{onClick:()=>setTimerRunning(false),style:{background:"#f59e0b",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:16,fontWeight:700,cursor:"pointer"}},"⏸ Pausa"),
          h("button",{onClick:()=>{setTimerRunning(false);setTimerLeft(timerSecs);},style:{background:"#334155",color:"#f1f5f9",border:"none",borderRadius:8,padding:"12px 20px",fontSize:16,cursor:"pointer"}},"↺")
        )
      ),
      h("div",{style:{background:"#1e293b",borderRadius:12,padding:20,border:"1px solid #334155",textAlign:"center"}},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:2,marginBottom:10}},"CRONÓMETRO"),
        h("div",{style:{fontSize:76,fontWeight:800,color:"#8b5cf6",fontVariantNumeric:"tabular-nums",lineHeight:1}},fmt(sw)),
        h("div",{style:{display:"flex",gap:8,justifyContent:"center",marginTop:14}},
          !swOn?h("button",{onClick:()=>{setSwOn(true);beep(getAudio());},style:{background:"#8b5cf6",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:16,fontWeight:700,cursor:"pointer"}},"▶ Iniciar"):
          h("button",{onClick:()=>setSwOn(false),style:{background:"#f59e0b",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:16,fontWeight:700,cursor:"pointer"}},"⏸ Pausa"),
          h("button",{onClick:()=>{setSwOn(false);setSw(0);},style:{background:"#334155",color:"#f1f5f9",border:"none",borderRadius:8,padding:"12px 20px",fontSize:16,cursor:"pointer"}},"↺")
        )
      )
    ),

    // ── HISTORY ──
    tab==="history"&&h("div",{style:{padding:16}},
      h("div",{style:{display:"flex",gap:4,marginBottom:14,background:"#1e293b",borderRadius:8,padding:4,border:"1px solid #334155"}},
        [["fecha","📅 Por fecha"],["musculo","💪 Por grupo"]].map(([k,l])=>h("button",{key:k,onClick:()=>setHistView(k),style:{flex:1,background:histView===k?pColor:"transparent",color:histView===k?"#fff":"#64748b",border:"none",borderRadius:6,padding:"8px",fontSize:13,fontWeight:histView===k?700:400,cursor:"pointer"}},l))
      ),
      histView==="fecha"&&h("div",null,
        sessionDates.length===0?h("div",{style:{color:"#475569",fontSize:13}},"Sin sesiones aún."):
        sessionDates.map(date=>{
          const muscles=getSessionMuscles(date);
          const sd=allLogKeys.filter(k=>k.startsWith(date)&&log[k].done).length;
          const days=[...new Set(allLogKeys.filter(k=>k.startsWith(date)).map(k=>k.split("__")[1]))];
          return h("div",{key:date,style:{background:"#1e293b",borderRadius:10,padding:12,marginBottom:8,border:"1px solid #334155"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              h("div",null,h("div",{style:{fontSize:14,fontWeight:700,color:"#f1f5f9"}},date),h("div",{style:{fontSize:11,color:"#64748b"}},days.join(", "))),
              h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:20,fontWeight:800,color:"#22c55e"}},sd),h("div",{style:{fontSize:10,color:"#64748b"}},"series ✓"))
            ),
            muscles.length>0&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},muscles.map(m=>h("span",{key:m,style:{background:GROUP_C[m]||"#334155",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:600}},m)))
          );
        })
      ),
      histView==="musculo"&&h("div",null,
        Object.keys(mFreq).length===0?h("div",{style:{color:"#475569",fontSize:13}},"Sin datos aún."):
        Object.entries(muscleHistory()).sort((a,b)=>b[1].length-a[1].length).map(([m,dates])=>{
          const c=GROUP_C[m]||"#64748b";
          const last=dates[0];
          const daysSince=Math.round((new Date(TODAY())-new Date(last))/(1000*60*60*24));
          return h("div",{key:m,style:{background:"#1e293b",borderRadius:10,padding:12,marginBottom:8,border:"1px solid #334155",borderLeft:`4px solid ${c}`}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
              h("div",{style:{fontSize:14,fontWeight:700,color:"#f1f5f9"}},m),
              h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:11,color:daysSince>7?"#f59e0b":"#22c55e",fontWeight:600}},`hace ${daysSince}d`),h("div",{style:{fontSize:10,color:"#64748b"}},`${dates.length} sesiones`))
            ),
            h("div",{style:{display:"flex",gap:3,flexWrap:"wrap"}},
              dates.slice(0,8).map((d,i)=>h("span",{key:i,style:{background:"#0f172a",border:`1px solid ${c}`,color:"#94a3b8",borderRadius:4,padding:"2px 6px",fontSize:10}},d.slice(5))),
              dates.length>8&&h("span",{style:{color:"#64748b",fontSize:10,padding:"2px 4px"}},`+${dates.length-8}`)
            )
          );
        })
      )
    )
  );
}

createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
