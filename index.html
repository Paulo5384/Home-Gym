<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Home Gym</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f172a;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;max-width:480px;margin:0 auto;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select{font-family:inherit;}

/* Profile */
#profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
#app-screen{display:none;}
.profile-btn{width:100%;max-width:320px;background:#1e293b;border-radius:14px;padding:20px;margin-bottom:16px;border:2px solid #334155;text-align:left;}
.profile-btn .emoji{font-size:28px;display:block;margin-bottom:6px;}
.profile-btn .name{font-size:20px;font-weight:800;color:#f1f5f9;display:block;}
.profile-btn .note{font-size:12px;color:#64748b;margin-top:4px;display:block;}
/* Header */
#header{background:#1e293b;padding:10px 16px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:10;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.back-btn{background:none;border:none;color:#64748b;font-size:18px;padding:0 8px 0 0;}
.profile-name{font-size:16px;font-weight:700;color:#f1f5f9;}
.sync-status{font-size:10px;color:#64748b;margin-top:2px;}
.sync-status.saved{color:#22c55e;}
.sync-status.error{color:#ef4444;}
.pct-display{font-size:22px;font-weight:800;text-align:right;}
.pct-sub{font-size:10px;color:#64748b;}
.progress-bar{margin-top:8px;background:#334155;border-radius:4px;height:5px;}
.progress-fill{height:5px;border-radius:4px;transition:width 0.4s;}
/* Tabs */
#tabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;}
.tab-btn{flex:none;padding:10px 14px;background:none;border:none;color:#64748b;font-weight:400;font-size:13px;border-bottom:2px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--pc);font-weight:700;border-bottom-color:var(--pc);}
/* Content */
.tab-content{display:none;padding:12px;}
.tab-content.active{display:block;}
/* Session */
.day-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.day-select{flex:1;background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:6px;padding:8px;font-size:12px;}
.date-input{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:6px;padding:7px 5px;font-size:11px;}
.action-row{display:flex;gap:6px;margin-bottom:12px;}
.btn{border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;}
.btn-edit{background:#334155;color:#fff;}
.btn-edit.active{background:#7c3aed;}
.btn-add{background:#0f4c75;color:#fff;}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.block-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;}
.btn-add-ex{background:#0f4c75;color:#93c5fd;border:1px solid #1e40af;border-radius:5px;padding:3px 8px;font-size:11px;}
.exercise-card{background:#1e293b;border-radius:10px;margin-bottom:8px;overflow:hidden;border:1px solid #334155;border-left:3px solid #64748b;}
.exercise-card.done{border-color:#166534;}
.ex-header{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155;}
.ex-name{font-size:12px;font-weight:700;color:#f1f5f9;}
.ex-name.done{color:#86efac;}
.ex-sub{font-size:10px;color:#64748b;margin-top:1px;}
.ex-controls{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-left:6px;}
.ex-info{font-size:11px;color:#64748b;}
.btn-timer{background:#0f172a;border:1px solid #334155;color:#64748b;border-radius:5px;padding:3px 6px;font-size:11px;}
.ex-tip{padding:5px 10px 2px;font-size:10px;color:#475569;font-style:italic;}
.sets-container{padding:6px 10px 10px;}
.set-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.set-done-btn{width:24px;height:24px;border-radius:50%;border:2px solid #475569;background:transparent;color:#fff;font-size:12px;flex-shrink:0;}
.set-done-btn.done{background:#22c55e;border-color:#22c55e;}
.set-label{font-size:10px;color:#64748b;width:14px;flex-shrink:0;}
.set-input{background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:5px;padding:4px;font-size:11px;text-align:center;}
.set-input.reps{width:46px;}
.set-input.weight{width:56px;}
.set-input.note{flex:1;color:#64748b;}
.btn-swap{background:#7c3aed;border:none;color:#fff;border-radius:4px;padding:4px 6px;font-size:11px;}
.btn-del{background:#7f1d1d;border:none;color:#fca5a5;border-radius:4px;padding:4px 6px;font-size:11px;}
.set-edit-input{background:#0f172a;color:#f1f5f9;border:1px solid #475569;border-radius:4px;padding:3px;font-size:11px;text-align:center;}
.set-edit-input.sets{width:32px;}
.set-edit-input.reps{width:48px;}
.ex-sep{color:#64748b;font-size:11px;}
/* Library */
.lib-search{width:100%;background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:8px;}
.filter-row{display:flex;gap:4px;overflow-x:auto;margin-bottom:6px;padding-bottom:2px;}
.filter-btn{flex-shrink:0;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:20px;padding:5px 10px;font-size:11px;}
.filter-btn.active{color:#fff;}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lib-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 8px;text-align:center;border-top:3px solid #64748b;}
.lib-card-name{font-size:11px;font-weight:700;color:#f1f5f9;line-height:1.3;margin-bottom:4px;}
.lib-card-group{font-size:10px;font-weight:600;}
.lib-card-meta{font-size:9px;color:#64748b;margin-top:2px;}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:#000b;z-index:900;align-items:flex-end;}
#modal-overlay.open{display:flex;}
#modal{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;border:1px solid #334155;}
.modal-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:4px;}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.tag{border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}
.modal-tip{background:#0f172a;border-radius:6px;padding:8px 10px;margin-bottom:14px;}
.modal-tip-label{font-size:11px;color:#475569;margin-bottom:2px;}
.modal-tip-text{font-size:12px;color:#94a3b8;}
.btn-modal-action{width:100%;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;margin-bottom:8px;}
.btn-modal-close{width:100%;background:#334155;color:#94a3b8;border:none;border-radius:8px;padding:10px;font-size:13px;}
/* Action banner */
#action-banner{display:none;position:sticky;top:0;background:#7c3aed;padding:10px 16px;z-index:50;justify-content:space-between;align-items:center;}
#action-banner.open{display:flex;}
.banner-text{font-size:13px;font-weight:700;color:#fff;}
.banner-close{background:none;border:none;color:#fff;font-size:18px;}
/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:#1e293b;border-radius:10px;padding:10px;border:1px solid #334155;text-align:center;}
.stat-label{font-size:12px;font-weight:600;color:#f1f5f9;margin-top:4px;}
.freq-card{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;}
.freq-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.freq-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.freq-label{width:65px;font-size:11px;color:#94a3b8;flex-shrink:0;}
.freq-bar-bg{flex:1;background:#334155;border-radius:4px;height:14px;}
.freq-bar-fill{height:14px;border-radius:4px;min-width:4px;}
.freq-count{font-size:11px;width:24px;text-align:right;flex-shrink:0;}
/* Timer */
.timer-card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:12px;text-align:center;}
.timer-label{font-size:11px;font-weight:700;color:#64748b;letter-spacing:2px;margin-bottom:10px;}
.timer-display{font-size:72px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
.timer-presets{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.preset-btn{background:#334155;color:#f1f5f9;border:none;border-radius:6px;padding:6px 12px;font-size:12px;}
.preset-btn.active{color:#fff;}
.timer-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;}
.btn-start{border:none;border-radius:8px;padding:12px 32px;font-size:16px;font-weight:700;}
.btn-reset{background:#334155;color:#f1f5f9;border:none;border-radius:8px;padding:12px 20px;font-size:16px;}
/* History */
.hist-toggle{display:flex;gap:4px;margin-bottom:14px;background:#1e293b;border-radius:8px;padding:4px;border:1px solid #334155;}
.hist-btn{flex:1;border:none;border-radius:6px;padding:8px;font-size:13px;background:transparent;color:#64748b;}
.hist-btn.active{color:#fff;}
.hist-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #334155;}
.hist-date{font-size:14px;font-weight:700;color:#f1f5f9;}
.hist-day{font-size:11px;color:#64748b;}
.hist-count{font-size:20px;font-weight:800;color:#22c55e;}
.hist-count-label{font-size:10px;color:#64748b;}
.muscle-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.muscle-tag{border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600;color:#fff;}
.hist-muscle-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #334155;border-left:4px solid #64748b;}
.hist-muscle-name{font-size:14px;font-weight:700;color:#f1f5f9;}
.hist-muscle-age{font-size:11px;font-weight:600;}
.hist-muscle-count{font-size:10px;color:#64748b;}
.date-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px;}
.date-tag{background:#0f172a;border-radius:4px;padding:2px 6px;font-size:10px;color:#94a3b8;}
/* Notif */
#notif{display:none;position:fixed;top:12px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;z-index:1000;box-shadow:0 4px 20px #0008;}
#notif.ok{background:#166534;display:block;}
#notif.err{background:#7f1d1d;display:block;}
.empty-msg{color:#475569;font-size:13px;}
</style>
</head>
<body>

<div id="notif"></div>

<!-- PROFILE SCREEN -->
<div id="profile-screen" class="screen active">
  <div style="font-size:32px;margin-bottom:8px">🏋️</div>
  <div style="font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:4px">Home Gym</div>
  <div style="font-size:13px;color:#64748b;margin-bottom:40px">¿Quién entrena hoy?</div>
  <button class="profile-btn" id="btn-paulo" style="border-color:#3b82f6">
    <span class="emoji">💪</span>
    <span class="name">Paulo</span>
    <span class="note">42 años · Banda + peso corporal · Días A/B/C</span>
  </button>
  <button class="profile-btn" id="btn-caro" style="border-color:#ec4899">
    <span class="emoji">🌸</span>
    <span class="name">Caro</span>
    <span class="note">Kinesióloga · Gym + casa · ⚠️ Cuidar cadera derecha</span>
  </button>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">
  <div id="header">
    <div class="header-row">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="back-btn" id="back-btn">←</button>
        <div>
          <div class="profile-name" id="header-name"></div>
          <div class="sync-status" id="sync-status"></div>
        </div>
      </div>
      <div>
        <div class="pct-display" id="pct-display">0%</div>
        <div class="pct-sub" id="pct-sub">0/0 series</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="action-banner">
    <span class="banner-text" id="banner-text"></span>
    <button class="banner-close" id="banner-close">✕</button>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-tab="session">Sesión</button>
    <button class="tab-btn" data-tab="library">Biblioteca</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
    <button class="tab-btn" data-tab="timer">⏱</button>
    <button class="tab-btn" data-tab="history">Historial</button>
  </div>

  <!-- SESSION TAB -->
  <div class="tab-content active" id="tab-session">
    <div class="day-row">
      <select class="day-select" id="day-select"></select>
      <input type="date" class="date-input" id="date-input"/>
    </div>
    <div class="action-row">
      <button class="btn btn-edit" id="edit-btn">✏️ Editar</button>
      <button class="btn btn-add" id="add-block-btn">+ Bloque</button>
    </div>
    <div id="blocks-container"></div>
  </div>

  <!-- LIBRARY TAB -->
  <div class="tab-content" id="tab-library">
    <input type="text" class="lib-search" id="lib-search" placeholder="🔍 Buscar ejercicio..."/>
    <div class="filter-row" id="group-filters"></div>
    <div class="filter-row" id="equip-filters"></div>
    <div class="lib-grid" id="lib-grid"></div>
  </div>

  <!-- STATS TAB -->
  <div class="tab-content" id="tab-stats">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="freq-card">
      <div class="freq-title">Frecuencia por grupo muscular</div>
      <div id="freq-bars"></div>
    </div>
  </div>

  <!-- TIMER TAB -->
  <div class="tab-content" id="tab-timer">
    <div class="timer-card">
      <div class="timer-label">DESCANSO</div>
      <div class="timer-display" id="countdown-display">01:00</div>
      <div class="timer-presets" id="countdown-presets"></div>
      <div class="timer-actions">
        <button class="btn-start" id="countdown-start" style="background:#22c55e;color:#fff">▶ Iniciar</button>
        <button class="btn-reset" id="countdown-reset">↺</button>
      </div>
    </div>
    <div class="timer-card">
      <div class="timer-label">CRONÓMETRO</div>
      <div class="timer-display" id="stopwatch-display" style="color:#8b5cf6">00:00</div>
      <div class="timer-actions">
        <button class="btn-start" id="stopwatch-start" style="background:#8b5cf6;color:#fff">▶ Iniciar</button>
        <button class="btn-reset" id="stopwatch-reset">↺</button>
      </div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div class="hist-toggle">
      <button class="hist-btn active" id="hist-fecha-btn">📅 Por fecha</button>
      <button class="hist-btn" id="hist-muscle-btn">💪 Por grupo</button>
    </div>
    <div id="hist-fecha-content"></div>
    <div id="hist-muscle-content" style="display:none"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-tags" id="modal-tags"></div>
    <div class="modal-tip">
      <div class="modal-tip-label">TÉCNICA</div>
      <div class="modal-tip-text" id="modal-tip"></div>
    </div>
    <button class="btn-modal-action" id="modal-action" style="display:none"></button>
    <button class="btn-modal-close" id="modal-close">Cerrar</button>
  </div>
</div>

<script type="module">

  {id:"squat_sumo",name:"Sentadilla Sumo",group:"Pierna",muscle:"Cuádriceps",secondary:"Glúteos, Aductores",equip:"Casa",diff:"Básico",tips:"Pies más anchos que hombros, puntas hacia afuera."},

function getAudio(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function beep(f=880,d=0.15,v=0.4){
  try{ const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);o.start();o.stop(ctx.currentTime+d); }catch(e){}
}
function beepEnd(){ [440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,0.2,0.5),i*180)); }

function notify(msg,type="ok"){
  const n=$("notif"); n.textContent=msg; n.className=type;
  setTimeout(()=>{ n.className=""; },2500);
}

function setSyncStatus(msg,cls=""){
  const el=$("sync-status"); el.textContent=msg; el.className="sync-status "+cls;
}

// ── FIREBASE ──────────────────────────────────────────────────
async function loadFromFirebase(){
  setSyncStatus("⏳ Cargando...");
  try {
    const [pd,ld] = await Promise.all([
      getDoc(doc(db,"homegym",`${profile}_plan`)),
      getDoc(doc(db,"homegym",`${profile}_log`))
    ]);
    if(pd.exists() && pd.data().value){
      plan = JSON.parse(pd.data().value);
    } else {
      const sp = localStorage.getItem(`hg_plan_${profile}`);
      plan = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(PROFILES[profile].plan));
    }
    if(ld.exists() && ld.data().value){
      log = JSON.parse(ld.data().value);
    } else {
      const sl = localStorage.getItem(`hg_log_${profile}`);
      log = sl ? JSON.parse(sl) : {};
    }
    activeDay = Object.keys(plan)[0]||"";
    setSyncStatus(today());
    renderAll();
  } catch(e) {
    setSyncStatus("⚠️ Sin conexión","error");
    const sp = localStorage.getItem(`hg_plan_${profile}`);
    const sl = localStorage.getItem(`hg_log_${profile}`);
    plan = sp ? JSON.parse(sp) : JSON.parse(JSON.stringify(PROFILES[profile].plan));
    log = sl ? JSON.parse(sl) : {};
    activeDay = Object.keys(plan)[0]||"";
    renderAll();
  }
}

function scheduleSave(){
  clearTimeout(saveTimeout);
  localStorage.setItem(`hg_plan_${profile}`, JSON.stringify(plan));
  localStorage.setItem(`hg_log_${profile}`, JSON.stringify(log));
  saveTimeout = setTimeout(async()=>{
    try{
      await Promise.all([
        setDoc(doc(db,"homegym",`${profile}_plan`),{value:JSON.stringify(plan)}),
        setDoc(doc(db,"homegym",`${profile}_log`),{value:JSON.stringify(log)})
      ]);
      setSyncStatus("☁️ Guardado","saved");
      setTimeout(()=>setSyncStatus(today()),2000);
    }catch(e){
      setSyncStatus("⚠️ Sin conexión","error");
      setTimeout(()=>setSyncStatus(today()),3000);
    }
  },1500);
}

function renderAll(){
  renderHeader();
  renderDaySelect();
  renderBlocks();
  renderLibrary();
  renderStats();
  renderHistory();
}

function renderHeader(){
  const p = PROFILES[profile];
  $("header-name").textContent = `${p.emoji} ${p.name}`;
  document.documentElement.style.setProperty("--pc", p.color);
  $("progress-fill").style.background = p.color;
  $("pct-display").style.color = p.color;
  updateProgress();
}

function updateProgress(){
  if(!activeDay||!plan[activeDay]){
    $("pct-display").textContent="0%";
    $("pct-sub").textContent="0/0 series";
    $("progress-fill").style.width="0%";
    return;
  }
  let total=0,done=0;
  plan[activeDay].blocks.forEach(b=>b.exercises.forEach(ex=>{
    for(let i=0;i<ex.sets;i++){ total++; if(getSet(ex.id,i).done) done++; }
  }));
  const pct = total?Math.round(done/total*100):0;
  $("pct-display").textContent=`${pct}%`;
  $("pct-display").style.color = pct===100?"#22c55e":PROFILES[profile].color;
  $("pct-sub").textContent=`${done}/${total} series`;
  $("progress-fill").style.width=`${pct}%`;
  $("progress-fill").style.background = pct===100?"#22c55e":PROFILES[profile].color;
}

function renderDaySelect(){
  const sel = $("day-select");
  sel.innerHTML = "";
  Object.keys(plan).forEach(dk=>{
    const o = document.createElement("option");
    o.value=dk; o.textContent=plan[dk].label||dk;
    if(dk===activeDay) o.selected=true;
    sel.appendChild(o);
  });
  $("date-input").value = sessionDate;
}

function renderBlocks(){
  const c = $("blocks-container");
  c.innerHTML="";
  if(!activeDay||!plan[activeDay]) return;
  plan[activeDay].blocks.forEach((block,bIdx)=>{
    const bDiv = document.createElement("div");
    bDiv.style.marginBottom="14px";
    const hRow = document.createElement("div");
    hRow.className="block-header";
    const bTitle = document.createElement("div");
    bTitle.className="block-title"; bTitle.textContent=block.name;
    hRow.appendChild(bTitle);
    if(editMode){
      const addEx = document.createElement("button");
      addEx.className="btn-add-ex"; addEx.textContent="+ ej.";
      addEx.onclick=()=>{ addTarget={dayKey:activeDay,blockIdx:bIdx}; openLibraryForAction(); };
      hRow.appendChild(addEx);
    }
    bDiv.appendChild(hRow);
    block.exercises.forEach((ex,eIdx)=>{
      bDiv.appendChild(renderExerciseCard(ex,bIdx,eIdx));
    });
    c.appendChild(bDiv);
  });
}

function renderExerciseCard(ex,bIdx,eIdx){
  const le = libEx(ex.libId);
  const gc = le?GROUP_C[le.group]||"#64748b":"#64748b";
  const allDone = Array.from({length:ex.sets},(_,i)=>getSet(ex.id,i).done).every(Boolean);

  const card = document.createElement("div");
  card.className="exercise-card"+(allDone?" done":"");
  card.style.borderLeftColor=gc;

  // Header
  const hdr = document.createElement("div"); hdr.className="ex-header";
  const info = document.createElement("div"); info.style.flex="1"; info.style.minWidth="0";
  const nm = document.createElement("div"); nm.className="ex-name"+(allDone?" done":"");
  nm.textContent=(allDone?"✓ ":"")+ex.name;
  info.appendChild(nm);
  if(le){ const sub=document.createElement("div");sub.className="ex-sub";sub.textContent=`${le.muscle} · ${le.equip==="Gym"?"🏋️":"🏠"}`;info.appendChild(sub); }
  hdr.appendChild(info);

  const ctrl = document.createElement("div"); ctrl.className="ex-controls";
  if(editMode){
    const si = document.createElement("input"); si.type="number"; si.min="1"; si.value=ex.sets; si.className="set-edit-input sets";
    si.onchange=()=>{ plan[activeDay].blocks[bIdx].exercises[eIdx].sets=parseInt(si.value)||1; renderBlocks(); scheduleSave(); };
    const sep = document.createElement("span"); sep.className="ex-sep"; sep.textContent="×";
    const ri = document.createElement("input"); ri.type="text"; ri.value=ex.reps; ri.className="set-edit-input reps";
    ri.onchange=()=>{ plan[activeDay].blocks[bIdx].exercises[eIdx].reps=ri.value; scheduleSave(); };
    const swBtn = document.createElement("button"); swBtn.className="btn-swap"; swBtn.textContent="↔";
    swBtn.onclick=()=>{ swapTarget={dayKey:activeDay,blockIdx:bIdx,exIdx:eIdx}; openLibraryForAction(); };
    const dlBtn = document.createElement("button"); dlBtn.className="btn-del"; dlBtn.textContent="✕";
    dlBtn.onclick=()=>{ plan[activeDay].blocks[bIdx].exercises.splice(eIdx,1); renderBlocks(); scheduleSave(); };
    [si,sep,ri,swBtn,dlBtn].forEach(el=>ctrl.appendChild(el));
  } else {
    const inf = document.createElement("span"); inf.className="ex-info"; inf.textContent=`${ex.sets}×${ex.reps}`;
    const tb = document.createElement("button"); tb.className="btn-timer"; tb.textContent=`⏱${ex.rest}s`;
    tb.onclick=()=>{ cdSecs=ex.rest||60; cdLeft=null; setTab("timer"); renderTimer(); };
    ctrl.appendChild(inf); ctrl.appendChild(tb);
  }
  hdr.appendChild(ctrl);
  card.appendChild(hdr);

  if(le&&!editMode){ const tip=document.createElement("div");tip.className="ex-tip";tip.textContent=`💡 ${le.tips}`;card.appendChild(tip); }

  // Sets
  const setsDiv = document.createElement("div"); setsDiv.className="sets-container";
  for(let si=0;si<ex.sets;si++){
    const sl = getSet(ex.id,si);
    const row = document.createElement("div"); row.className="set-row";
    const dBtn = document.createElement("button"); dBtn.className="set-done-btn"+(sl.done?" done":"");
    dBtn.textContent=sl.done?"✓":"";
    dBtn.onclick=(()=>{
      const _si=si,_exId=ex.id;
      return ()=>{
        const cur=getSet(_exId,_si);
        const k=lk(sessionDate,activeDay,_exId,_si);
        log[k]={...cur,done:!cur.done};
        if(!cur.done) beep(523,0.12,0.3);
        scheduleSave();
        renderBlocks(); updateProgress(); renderStats(); renderHistory();
      };
    })();
    const lbl = document.createElement("span"); lbl.className="set-label"; lbl.textContent=`S${si+1}`;
    const ri = document.createElement("input"); ri.placeholder="Reps"; ri.value=sl.reps; ri.className="set-input reps";
    ri.oninput=(()=>{ const _si=si,_exId=ex.id; return e=>{ const k=lk(sessionDate,activeDay,_exId,_si);log[k]={...getSet(_exId,_si),reps:e.target.value};scheduleSave(); }; })();
    const wi = document.createElement("input"); wi.placeholder="carga"; wi.value=sl.weight; wi.className="set-input weight";
    wi.oninput=(()=>{ const _si=si,_exId=ex.id; return e=>{ const k=lk(sessionDate,activeDay,_exId,_si);log[k]={...getSet(_exId,_si),weight:e.target.value};scheduleSave(); }; })();
    const ni = document.createElement("input"); ni.placeholder="nota"; ni.value=sl.note; ni.className="set-input note";
    ni.oninput=(()=>{ const _si=si,_exId=ex.id; return e=>{ const k=lk(sessionDate,activeDay,_exId,_si);log[k]={...getSet(_exId,_si),note:e.target.value};scheduleSave(); }; })();
    [dBtn,lbl,ri,wi,ni].forEach(el=>row.appendChild(el));
    setsDiv.appendChild(row);
  }
  card.appendChild(setsDiv);
  return card;
}

// ── LIBRARY ───────────────────────────────────────────────────
function renderLibrary(){
  // Group filters
  const gf = $("group-filters"); gf.innerHTML="";
  ["Todos","Pierna","Pecho","Espalda","Hombros","Bíceps","Tríceps","Core","Cardio"].forEach(g=>{
    const b=document.createElement("button"); b.className="filter-btn"+(libGroupFilter===g?" active":"");
    b.textContent=g; b.style.background=libGroupFilter===g?(GROUP_C[g]||"#3b82f6"):"#1e293b";
    if(libGroupFilter===g) b.style.borderColor=GROUP_C[g]||"#3b82f6";
    b.onclick=()=>{ libGroupFilter=g; renderLibrary(); };
    gf.appendChild(b);
  });
  // Equip filters
  const ef = $("equip-filters"); ef.innerHTML="";
  ["Todos","Casa 🏠","Gym 🏋️"].forEach(e=>{
    const b=document.createElement("button"); b.className="filter-btn"+(libEquipFilter===e?" active":"");
    b.textContent=e;
    b.onclick=()=>{ libEquipFilter=e; renderLibrary(); };
    ef.appendChild(b);
  });
  // Grid
  const grid = $("lib-grid"); grid.innerHTML="";
  const filtered = LIBRARY.filter(ex=>{
    const gOk=libGroupFilter==="Todos"||ex.group===libGroupFilter;
    const eOk=libEquipFilter==="Todos"||(libEquipFilter.includes("Casa")&&ex.equip==="Casa")||(libEquipFilter.includes("Gym")&&ex.equip==="Gym");
    const sOk=!libSearchVal||ex.name.toLowerCase().includes(libSearchVal.toLowerCase())||ex.muscle.toLowerCase().includes(libSearchVal.toLowerCase());
    return gOk&&eOk&&sOk;
  });
  filtered.forEach(ex=>{
    const gc=GROUP_C[ex.group]||"#64748b";
    const card=document.createElement("button"); card.className="lib-card"; card.style.borderTopColor=gc;
    card.innerHTML=`<div class="lib-card-name">${ex.name}</div><div class="lib-card-group" style="color:${gc}">${ex.group}</div><div class="lib-card-meta">${ex.equip==="Gym"?"🏋️":"🏠"} ${ex.equip} · <span style="color:${DIFF_C[ex.diff]}">${ex.diff}</span></div>`;
    card.onclick=()=>openModal(ex);
    grid.appendChild(card);
  });
}

function openLibraryForAction(){
  $("action-banner").classList.add("open");
  $("banner-text").textContent=swapTarget?"↔ Elige ejercicio de reemplazo":"+ Elige ejercicio para agregar";
  setTab("library");
}

function openModal(ex){
  selectedLibEx=ex;
  const gc=GROUP_C[ex.group]||"#64748b";
  $("modal-title").textContent=ex.name;
  $("modal-tags").innerHTML=`
    <span class="tag" style="background:${gc};color:#fff">${ex.muscle}</span>
    <span class="tag" style="background:#334155;color:#94a3b8">${ex.secondary}</span>
    <span class="tag" style="background:${ex.equip==="Gym"?"#1e3a5f":"#14532d"};color:${ex.equip==="Gym"?"#93c5fd":"#86efac"}">${ex.equip==="Gym"?"🏋️":"🏠"} ${ex.equip}</span>
    <span class="tag" style="color:${DIFF_C[ex.diff]};background:transparent">${ex.diff}</span>`;
  $("modal-tip").textContent=ex.tips;
  const actionBtn=$("modal-action");
  if(swapTarget){
    actionBtn.style.display="block"; actionBtn.style.background="#7c3aed"; actionBtn.style.color="#fff";
    actionBtn.textContent="↔ Usar como reemplazo";
    actionBtn.onclick=()=>{ doSwap(ex); closeModal(); };
  } else if(addTarget){
    actionBtn.style.display="block"; actionBtn.style.background=PROFILES[profile].color; actionBtn.style.color="#fff";
    actionBtn.textContent="+ Agregar al entrenamiento";
    actionBtn.onclick=()=>{ doAdd(ex); closeModal(); };
  } else {
    actionBtn.style.display="none";
  }
  $("modal-overlay").classList.add("open");
}

function closeModal(){ $("modal-overlay").classList.remove("open"); selectedLibEx=null; }

function doSwap(ex){
  const{dayKey,blockIdx,exIdx}=swapTarget;
  const old=plan[dayKey].blocks[blockIdx].exercises[exIdx];
  plan[dayKey].blocks[blockIdx].exercises[exIdx]={...old,libId:ex.id,name:ex.name};
  swapTarget=null; addTarget=null;
  $("action-banner").classList.remove("open");
  notify(`↔ ${ex.name}`);
  renderBlocks(); scheduleSave(); setTab("session");
}

function doAdd(ex){
  const newEx={id:uid(),libId:ex.id,name:ex.name,sets:3,reps:"12-15",rest:60};
  if(addTarget==="newBlock"){
    plan[activeDay].blocks.push({name:"Bloque nuevo",exercises:[newEx]});
  } else {
    const{dayKey,blockIdx}=addTarget;
    plan[dayKey].blocks[blockIdx].exercises.push(newEx);
  }
  swapTarget=null; addTarget=null;
  $("action-banner").classList.remove("open");
  notify(`✓ ${ex.name} agregado`);
  renderDaySelect(); renderBlocks(); scheduleSave(); setTab("session");
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats(){
  const allKeys=Object.keys(log);
  const wk=weekKey(sessionDate), mk=monthKey(sessionDate);

  // Session pct
  let total=0,done=0;
  if(activeDay&&plan[activeDay]) plan[activeDay].blocks.forEach(b=>b.exercises.forEach(ex=>{for(let i=0;i<ex.sets;i++){total++;if(getSet(ex.id,i).done)done++;}}));
  const todayPct=total?Math.round(done/total*100):0;

  const weekDone=allKeys.filter(k=>weekKey(k.split("__")[0])===wk&&log[k].done).length;
  const weekTotal=allKeys.filter(k=>weekKey(k.split("__")[0])===wk).length;
  const weekPct=weekTotal?Math.min(100,Math.round(weekDone/weekTotal*100)):0;

  const monthDone=allKeys.filter(k=>monthKey(k.split("__")[0])===mk&&log[k].done).length;
  const monthTotal=allKeys.filter(k=>monthKey(k.split("__")[0])===mk).length;
  const monthPct=monthTotal?Math.min(100,Math.round(monthDone/monthTotal*100)):0;

  const pc=PROFILES[profile].color;
  $("stat-grid").innerHTML=[["Hoy",todayPct],["Semana",weekPct],["Mes",monthPct]].map(([l,v])=>`
    <div class="stat-card">
      <svg viewBox="0 0 56 56" width="56" height="56" style="display:block;margin:0 auto 4px">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#334155" stroke-width="5"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="${v===100?"#22c55e":pc}" stroke-width="5"
          stroke-dasharray="${2*Math.PI*22}" stroke-dashoffset="${2*Math.PI*22*(1-v/100)}"
          stroke-linecap="round" transform="rotate(-90 28 28)"/>
        <text x="28" y="33" text-anchor="middle" fill="${v===100?"#22c55e":pc}" font-size="11" font-weight="bold">${v}%</text>
      </svg>
      <div class="stat-label">${l}</div>
    </div>`).join("");

  // Freq
  const freq={};
  allKeys.forEach(k=>{
    if(!log[k].done)return;
    const[,dk,exId]=k.split("__");
    const dp=plan[dk]; if(!dp)return;
    const ex=dp.blocks.flatMap(b=>b.exercises).find(e=>e.id===exId); if(!ex)return;
    const le=libEx(ex.libId); if(!le)return;
    freq[le.group]=(freq[le.group]||0)+1;
  });
  const fb=$("freq-bars");
  if(!Object.keys(freq).length){ fb.innerHTML='<div class="empty-msg">Registra sesiones para ver datos.</div>'; return; }
  const max=Math.max(...Object.values(freq));
  fb.innerHTML=Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([m,v])=>{
    const c=GROUP_C[m]||"#64748b";
    return `<div class="freq-row"><div class="freq-label">${m}</div><div class="freq-bar-bg"><div class="freq-bar-fill" style="width:${Math.round(v/max*100)}%;background:${c}"></div></div><div class="freq-count" style="color:${c}">${v}</div></div>`;
  }).join("");
}

// ── TIMER ─────────────────────────────────────────────────────
function renderTimer(){
  const pc=PROFILES[profile].color;
  // Presets
  const pp=$("countdown-presets"); pp.innerHTML="";
  [30,45,60,90,120].forEach(s=>{
    const b=document.createElement("button"); b.className="preset-btn"+(cdSecs===s?" active":"");
    if(cdSecs===s) b.style.background=pc;
    b.textContent=`${s}s`;
    b.onclick=()=>{ cdSecs=s; cdLeft=null; clearInterval(cdInterval); cdRunning=false; $("countdown-start").textContent="▶ Iniciar"; renderTimer(); };
    pp.appendChild(b);
  });
  updateCdDisplay();
}

function updateCdDisplay(){
  const left=cdLeft!=null?cdLeft:cdSecs;
  const color=left<=5?"#ef4444":left<=15?"#f59e0b":"#22c55e";
  $("countdown-display").textContent=fmt(left);
  $("countdown-display").style.color=color;
}

$("countdown-start").onclick=()=>{
  if(cdRunning){ cdRunning=false; clearInterval(cdInterval); $("countdown-start").textContent="▶ Iniciar"; $("countdown-start").style.background="#22c55e"; }
  else{
    if(cdLeft===null||cdLeft===0) cdLeft=cdSecs;
    cdRunning=true; $("countdown-start").textContent="⏸ Pausa"; $("countdown-start").style.background="#f59e0b";
    beep(); cdInterval=setInterval(()=>{
      if(cdLeft<=0){ clearInterval(cdInterval); cdRunning=false; $("countdown-start").textContent="▶ Iniciar"; $("countdown-start").style.background="#22c55e"; beepEnd(); return; }
      if(cdLeft<=4) beep(660,0.1,0.3); cdLeft--; updateCdDisplay();
    },1000);
  }
};
$("countdown-reset").onclick=()=>{ clearInterval(cdInterval); cdRunning=false; cdLeft=cdSecs; $("countdown-start").textContent="▶ Iniciar"; $("countdown-start").style.background="#22c55e"; updateCdDisplay(); };

$("stopwatch-start").onclick=()=>{
  if(swRunning){ swRunning=false; clearInterval(swInterval); $("stopwatch-start").textContent="▶ Iniciar"; $("stopwatch-start").style.background="#8b5cf6"; }
  else{ swRunning=true; beep(); $("stopwatch-start").textContent="⏸ Pausa"; $("stopwatch-start").style.background="#f59e0b"; swInterval=setInterval(()=>{ swSecs++; $("stopwatch-display").textContent=fmt(swSecs); },1000); }
};
$("stopwatch-reset").onclick=()=>{ clearInterval(swInterval); swRunning=false; swSecs=0; $("stopwatch-start").textContent="▶ Iniciar"; $("stopwatch-start").style.background="#8b5cf6"; $("stopwatch-display").textContent="00:00"; };

// ── HISTORY ───────────────────────────────────────────────────
function renderHistory(){
  const allKeys=Object.keys(log);
  const dates=[...new Set(allKeys.map(k=>k.split("__")[0]))].sort().reverse();

  // By date
  const fd=$("hist-fecha-content"); fd.innerHTML="";
  if(!dates.length){ fd.innerHTML='<div class="empty-msg">Sin sesiones aún.</div>'; }
  dates.forEach(date=>{
    const muscles=new Set();
    allKeys.filter(k=>k.startsWith(date)&&log[k].done).forEach(k=>{
      const[,dk,exId]=k.split("__");
      const dp=plan[dk]; if(!dp)return;
      const ex=dp.blocks.flatMap(b=>b.exercises).find(e=>e.id===exId); if(!ex)return;
      const le=libEx(ex.libId); if(le) muscles.add(le.group);
    });
    const sd=allKeys.filter(k=>k.startsWith(date)&&log[k].done).length;
    const days=[...new Set(allKeys.filter(k=>k.startsWith(date)).map(k=>k.split("__")[1]))];
    const card=document.createElement("div"); card.className="hist-card";
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${muscles.size?8:0}px"><div><div class="hist-date">${date}</div><div class="hist-day">${days.join(", ")}</div></div><div style="text-align:right"><div class="hist-count">${sd}</div><div class="hist-count-label">series ✓</div></div></div>${muscles.size?`<div class="muscle-tags">${[...muscles].map(m=>`<span class="muscle-tag" style="background:${GROUP_C[m]||"#334155"}">${m}</span>`).join("")}</div>`:""}`;
    fd.appendChild(card);
  });

  // By muscle
  const freq={};
  allKeys.forEach(k=>{
    if(!log[k].done)return;
    const[date,dk,exId]=k.split("__");
    const dp=plan[dk]; if(!dp)return;
    const ex=dp.blocks.flatMap(b=>b.exercises).find(e=>e.id===exId); if(!ex)return;
    const le=libEx(ex.libId); if(!le)return;
    const g=le.group;
    if(!freq[g]) freq[g]=[];
    if(!freq[g].includes(date)) freq[g].push(date);
  });
  const md=$("hist-muscle-content"); md.innerHTML="";
  if(!Object.keys(freq).length){ md.innerHTML='<div class="empty-msg">Sin datos aún.</div>'; }
  Object.entries(freq).sort((a,b)=>b[1].length-a[1].length).forEach(([m,dates])=>{
    const c=GROUP_C[m]||"#64748b";
    const last=dates.sort().reverse()[0];
    const daysSince=Math.round((new Date(today())-new Date(last))/(1000*60*60*24));
    const ageColor=daysSince>7?"#f59e0b":"#22c55e";
    const card=document.createElement("div"); card.className="hist-muscle-card"; card.style.borderLeftColor=c;
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="hist-muscle-name">${m}</div><div style="text-align:right"><div class="hist-muscle-age" style="color:${ageColor}">hace ${daysSince}d</div><div class="hist-muscle-count">${dates.length} sesiones</div></div></div><div class="date-tags">${dates.slice(0,8).map(d=>`<span class="date-tag" style="border:1px solid ${c}">${d.slice(5)}</span>`).join("")}${dates.length>8?`<span style="color:#64748b;font-size:10px">+${dates.length-8}</span>`:""}</div>`;
    md.appendChild(card);
  });
}

// ── TAB SWITCHING ─────────────────────────────────────────────
function setTab(name){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.toggle("active",c.id===`tab-${name}`));
  if(name==="stats") renderStats();
  if(name==="history") renderHistory();
  if(name==="timer") renderTimer();
}
document.querySelectorAll(".tab-btn").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

// ── EVENT LISTENERS ───────────────────────────────────────────
$("btn-paulo").onclick=()=>startProfile("paulo");
$("btn-caro").onclick=()=>startProfile("caro");
$("back-btn").onclick=()=>{
  $("profile-screen").style.display="flex";
  $("app-screen").style.display="none";
  profile=null;
};
$("edit-btn").onclick=()=>{ editMode=!editMode; $("edit-btn").textContent=editMode?"✓ Listo":"✏️ Editar"; $("edit-btn").className="btn btn-edit"+(editMode?" active":""); renderBlocks(); };
$("add-block-btn").onclick=()=>{ addTarget="newBlock"; openLibraryForAction(); };
$("day-select").onchange=e=>{ activeDay=e.target.value; renderBlocks(); updateProgress(); };
$("date-input").onchange=e=>{ sessionDate=e.target.value; renderBlocks(); updateProgress(); renderStats(); renderHistory(); };
$("lib-search").oninput=e=>{ libSearchVal=e.target.value; renderLibrary(); };
$("modal-close").onclick=closeModal;
$("modal-overlay").onclick=e=>{ if(e.target===$("modal-overlay")) closeModal(); };
$("banner-close").onclick=()=>{ swapTarget=null; addTarget=null; $("action-banner").classList.remove("open"); };
$("hist-fecha-btn").onclick=()=>{ histView="fecha"; $("hist-fecha-btn").classList.add("active"); $("hist-muscle-btn").classList.remove("active"); $("hist-fecha-btn").style.background=PROFILES[profile].color; $("hist-muscle-btn").style.background="transparent"; $("hist-fecha-content").style.display="block"; $("hist-muscle-content").style.display="none"; };
$("hist-muscle-btn").onclick=()=>{ histView="musculo"; $("hist-muscle-btn").classList.add("active"); $("hist-fecha-btn").classList.remove("active"); $("hist-muscle-btn").style.background=PROFILES[profile].color; $("hist-fecha-btn").style.background="transparent"; $("hist-muscle-content").style.display="block"; $("hist-fecha-content").style.display="none"; };

// ── INIT ──────────────────────────────────────────────────────
async function startProfile(p){
  profile=p;
  sessionDate=today();
  editMode=false;
  $("profile-screen").style.display="none";
  $("app-screen").style.display="block";
  window.scrollTo(0,0);
  setTab("session");
  await loadFromFirebase();
}
</script>
